name: Build AirbaseSim

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: "4.2.2"
          include-templates: true

      - name: Export Windows
        shell: bash
        run: |
          mkdir -p build/windows
          godot --headless --path . --export-release "Windows Desktop" build/windows/AirbaseSim.exe

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: AirbaseSim-Windows
          path: build/windows

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: "4.2.2"
          include-templates: true

      - name: Export macOS
        run: |
          mkdir -p build/macos
          godot --headless --path . --export-release "macOS" build/macos/AirbaseSim.app

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: AirbaseSim-macOS
          path: build/macos